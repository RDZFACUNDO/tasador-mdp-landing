<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Calor - Mar del Plata</title>
    <meta name="description" content="Mapa de calor de precios inmobiliarios por zona en Mar del Plata. Visualiza los valores por m² en cada barrio.">

    <link rel="icon" type="image/png" href="/images/favicon-app.png">
    <link rel="apple-touch-icon" href="/images/favicon-app.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Map Container - Full Screen. La navegación (header + volver al
           inicio) ahora vive DENTRO del HTML que genera mapa_calor.py, asi
           que este wrapper no necesita header/nav propios. */
        .map-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .map-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- Map Container -->
    <div class="map-container">
        <iframe
            class="map-iframe"
            src="https://rdzfacundo.github.io/mapa-mdp/mapa-calor"
            title="Mapa de Calor Inmobiliario MDP"
            allow="geolocation"
            loading="lazy">
        </iframe>
    </div>
</body>
</html>
