<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Inmobiliario MDP - Análisis Estadístico (Mockup)</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Roboto', sans-serif; background:#f5f5f5; color:#333; }
.teal { color:#5B8B8A; }
.bg-teal { background:#5B8B8A; }
.chip { border:1px solid #d1d5db; border-radius:999px; padding:4px 12px; font-size:12px; cursor:pointer; user-select:none; transition:.15s; }
.chip.active { background:#5B8B8A; color:white; border-color:#5B8B8A; }
.checkbox-row { display:flex; align-items:center; gap:8px; font-size:13px; padding:3px 0; cursor:pointer; }
.tab-btn { padding:10px 18px; font-size:14px; font-weight:500; border-bottom:3px solid transparent; cursor:pointer; color:#666; }
.tab-btn.active { color:#5B8B8A; border-bottom-color:#5B8B8A; }
.table-container::-webkit-scrollbar { width:6px; }
.table-container::-webkit-scrollbar-thumb { background:#c9c9c9; border-radius:4px; }
input[type=range]{ accent-color:#5B8B8A; }
</style>
</head>
<body>
<div class="max-w-[1500px] mx-auto my-6 px-4">
  <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
    <div id="root"></div>
  </div>
</div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const BARRIOS_MDP = [
  {n:'Centro', lat:-38.0055, lng:-57.5426}, {n:'Playa Grande', lat:-38.0279, lng:-57.5352},
  {n:'Playa Chica', lat:-38.0231, lng:-57.5307}, {n:'Playa Varese', lat:-38.0198, lng:-57.5288},
  {n:'Güemes', lat:-38.0177, lng:-57.5464}, {n:'La Perla', lat:-37.9838, lng:-57.5486},
  {n:'Chauvín', lat:-38.0055, lng:-57.5426}, {n:'Stella Maris', lat:-37.9962, lng:-57.5601},
  {n:'Torreón', lat:-38.0334, lng:-57.5406}, {n:'Cabo Corrientes', lat:-38.0323, lng:-57.5388},
];
const TIPOS = ['Departamento','Casa','PH','Local Comercial','Oficina comercial'];
const ANTIGUEDADES = ['A estrenar','En construcción','0-10 años','10-30 años','30+ años'];
const DISPOSICIONES = ['Frente','Contrafrente','Interno','Lateral'];
const INMOBILIARIAS = ['Yacoub','Bessone Inmobiliaria','Tornato Propiedades','Re/Max Feliz','Century 21','Girard Propiedades'];
const COLORS_AMB = {1:'#3b82f6',2:'#1d4ed8',3:'#f97316',4:'#7e22ce',5:'#ec4899',6:'#8b5cf6'};

function generarMock(n=724){
  const out=[];
  for(let i=0;i<n;i++){
    const tipo = TIPOS[Math.floor(Math.random()*TIPOS.length)];
    const barrio = BARRIOS_MDP[Math.floor(Math.random()*BARRIOS_MDP.length)];
    const area = Math.floor(Math.random()*220)+25;
    const rooms = Math.min(6, Math.floor(Math.random()*6)+1);
    const baseM2 = 3200 - (area*5) + (Math.random()*700) + (tipo==='Local Comercial'||tipo==='Oficina comercial'?400:0);
    const price = Math.round(baseM2*area);
    const diasPub = Math.floor(Math.random()*280)+1;
    out.push({
      posting_id:100000+i,
      url:`https://www.zonaprop.com.ar/propiedades/mock-${i}.html`,
      real_estate_type: tipo,
      price_value: price,
      covered_area_m2: area,
      rooms,
      bathrooms: Math.max(1, Math.round(rooms*0.7)),
      parking: Math.random()<0.55 ? 0 : Math.floor(Math.random()*3)+1,
      antiquity: ANTIGUEDADES[Math.floor(Math.random()*ANTIGUEDADES.length)],
      disposition: Math.random()<0.6 ? DISPOSICIONES[Math.floor(Math.random()*DISPOSICIONES.length)] : null,
      barrio: barrio.n,
      latitud: barrio.lat + (Math.random()-0.5)*0.01,
      longitud: barrio.lng + (Math.random()-0.5)*0.01,
      publisher_name: INMOBILIARIAS[Math.floor(Math.random()*INMOBILIARIAS.length)],
      views: Math.floor(Math.random()*11),
      dias_publicado: diasPub,
    });
  }
  return out;
}

const fmt = n => new Intl.NumberFormat('en-US').format(Math.round(n));

const App = () => {
  const data = useMemo(()=>generarMock(),[]);

  const [tipos, setTipos] = useState([]);
  const [areaMin, setAreaMin] = useState(20);
  const [areaMax, setAreaMax] = useState(250);
  const [valorMin, setValorMin] = useState(20000);
  const [valorMax, setValorMax] = useState(400000);
  const [antiguedad, setAntiguedad] = useState('Todas');
  const [disposiciones, setDisposiciones] = useState([]);
  const [cocheras, setCocheras] = useState('Todas');
  const [inmobiliaria, setInmobiliaria] = useState('Todas');
  const [ambientes, setAmbientes] = useState([]);
  const [barrios, setBarrios] = useState([]);

  const toggle = (setter, arr, val) => setter(arr.includes(val) ? arr.filter(v=>v!==val) : [...arr, val]);

  const filtered = useMemo(()=>data.filter(d=>{
    if(tipos.length && !tipos.includes(d.real_estate_type)) return false;
    if(d.covered_area_m2 < areaMin || d.covered_area_m2 > areaMax) return false;
    if(d.price_value < valorMin || d.price_value > valorMax) return false;
    if(antiguedad!=='Todas' && d.antiquity!==antiguedad) return false;
    if(disposiciones.length && !disposiciones.includes(d.disposition)) return false;
    if(cocheras!=='Todas'){
      if(cocheras==='3+' ? d.parking<3 : d.parking!==Number(cocheras)) return false;
    }
    if(inmobiliaria!=='Todas' && d.publisher_name!==inmobiliaria) return false;
    if(ambientes.length){
      const r = d.rooms>=6?'6+':String(d.rooms);
      if(!ambientes.includes(r)) return false;
    }
    if(barrios.length && !barrios.includes(d.barrio)) return false;
    return true;
  }),[data,tipos,areaMin,areaMax,valorMin,valorMax,antiguedad,disposiciones,cocheras,inmobiliaria,ambientes,barrios]);

  const avgM2 = useMemo(()=>{
    if(!filtered.length) return 0;
    return filtered.reduce((a,d)=>a+d.price_value/d.covered_area_m2,0)/filtered.length;
  },[filtered]);

  const aggregate = (key) => {
    const groups = {};
    filtered.forEach(d=>{
      const k = d[key]||'No identificado';
      if(!groups[k]) groups[k]={count:0,sum:0};
      groups[k].count++; groups[k].sum += d.price_value/d.covered_area_m2;
    });
    return Object.entries(groups).map(([k,v])=>({name:k,qty:v.count,avgM2:Math.round(v.sum/v.count)}));
  };
  const porInmobiliariaBase = useMemo(()=>aggregate('publisher_name'),[filtered]);
  const porBarrioBase = useMemo(()=>aggregate('barrio'),[filtered]);

  // Sort genérico reutilizable: cada tabla guarda su propio {key, dir}
  const useSort = (rows, defaultKey) => {
    const [sort, setSort] = useState({key: defaultKey, dir: 'desc'});
    const sorted = useMemo(()=>{
      const arr = [...rows];
      arr.sort((a,b)=>{
        const va = a[sort.key], vb = b[sort.key];
        const cmp = typeof va === 'string' ? va.localeCompare(vb) : va - vb;
        return sort.dir === 'asc' ? cmp : -cmp;
      });
      return arr;
    },[rows, sort]);
    const onSort = (key) => setSort(s => ({key, dir: s.key===key && s.dir==='desc' ? 'asc' : 'desc'}));
    return [sorted, sort, onSort];
  };

  const [porInmobiliaria, sortInmob, onSortInmob] = useSort(porInmobiliariaBase, 'qty');
  const [porBarrio, sortBarrio, onSortBarrio] = useSort(porBarrioBase, 'qty');
  const [topVistas, sortVistas, onSortVistas] = useSort(filtered, 'views');

  const Arrow = ({active, dir}) => <span style={{opacity:active?1:0.25, fontSize:'9px', marginLeft:'2px'}}>{dir==='asc'?'▲':'▼'}</span>;

  const plotRef = useRef(null);
  useEffect(()=>{
    if(!plotRef.current) return;
    const valid = filtered.filter(d=>d.covered_area_m2>0);
    if(!valid.length){ Plotly.purge(plotRef.current); return; }

    // Regresión cuadrática en log10(área): y = b0 + b1*u + b2*u^2, u=log10(x)
    // (en vez de una recta con 2 extremos) para que la curva y las bandas de
    // SD sigan la curvatura real de la nube de puntos, no una aproximación lineal.
    const N = valid.length;
    const us = valid.map(d=>Math.log10(d.covered_area_m2));
    const ys = valid.map(d=>d.price_value/d.covered_area_m2);

    let S0=N,S1=0,S2=0,S3=0,S4=0,T0=0,T1=0,T2=0;
    for(let i=0;i<N;i++){
      const u=us[i], y=ys[i], u2=u*u;
      S1+=u; S2+=u2; S3+=u2*u; S4+=u2*u2;
      T0+=y; T1+=y*u; T2+=y*u2;
    }
    // Resolver sistema 3x3 (ecuaciones normales) por eliminación gaussiana
    const A=[[S0,S1,S2,T0],[S1,S2,S3,T1],[S2,S3,S4,T2]];
    for(let i=0;i<3;i++){
      let piv=A[i][i];
      for(let j=i;j<4;j++) A[i][j]/=piv;
      for(let k=0;k<3;k++){ if(k===i) continue; const f=A[k][i]; for(let j=i;j<4;j++) A[k][j]-=f*A[i][j]; }
    }
    const [b0,b1,b2]=[A[0][3],A[1][3],A[2][3]];
    const predict = u => b0 + b1*u + b2*u*u;

    let sumSq=0;
    for(let i=0;i<N;i++){ const res=ys[i]-predict(us[i]); sumSq+=res*res; }
    const sd = Math.sqrt(sumSq/N);

    const uMin=Math.min(...us), uMax=Math.max(...us);
    const STEPS=40;
    const curveX=[], curveY=[], curveHi=[], curveLo=[];
    for(let i=0;i<=STEPS;i++){
      const u = uMin + (uMax-uMin)*i/STEPS;
      const x = Math.pow(10,u);
      const p = predict(u);
      curveX.push(x); curveY.push(p); curveHi.push(p+sd); curveLo.push(p-sd);
    }

    const traces=[];
    traces.push({x:curveX, y:curveY, mode:'lines', name:'Regresión', line:{color:'#4b5563',width:2,shape:'spline'}, hoverinfo:'name'});
    traces.push({x:curveX, y:curveHi, mode:'lines', name:'+1 SD', line:{color:'#ef4444',width:1,dash:'dash',shape:'spline'}, hoverinfo:'none'});
    traces.push({x:curveX, y:curveLo, mode:'lines', name:'-1 SD', line:{color:'#22c55e',width:1,dash:'dash',shape:'spline'}, hoverinfo:'none'});

    const grouped={};
    valid.forEach(d=>{
      let r=d.rooms>=6?6:d.rooms;
      if(!grouped[r]) grouped[r]={x:[],y:[],text:[],custom:[],colors:[]};
      const y=d.price_value/d.covered_area_m2;
      const pred=predict(Math.log10(d.covered_area_m2));
      let color = COLORS_AMB[r]||'#9ca3af';
      if(y>pred+sd) color='#ef4444'; else if(y<pred-sd) color='#22c55e';
      grouped[r].x.push(d.covered_area_m2); grouped[r].y.push(y);
      grouped[r].text.push(`${d.real_estate_type} - ${d.barrio}<br>Área: ${d.covered_area_m2} m² - US$ ${fmt(d.price_value)}`);
      grouped[r].custom.push(d.url); grouped[r].colors.push(color);
    });
    Object.entries(grouped).forEach(([r,g])=>{
      traces.push({x:g.x,y:g.y,text:g.text,customdata:g.custom,mode:'markers',type:'scatter',name:String(r),
        marker:{color:g.colors,size:6,opacity:0.75}, hoverinfo:'text'});
    });

    Plotly.newPlot(plotRef.current, traces, {
      margin:{t:10,l:60,r:20,b:40},
      xaxis:{title:'Área m² Cubierta (Log)', type:'log', gridcolor:'#f3f4f6'},
      yaxis:{title:'Valor por m²', gridcolor:'#f3f4f6'},
      showlegend:false, plot_bgcolor:'white', paper_bgcolor:'white', hovermode:'closest'
    }, {responsive:true, displayModeBar:false});

  },[filtered]);

  return (
    <div className="flex" style={{minHeight:'900px'}}>
      <aside className="w-[260px] border-r border-gray-200 p-4 overflow-y-auto" style={{maxHeight:'1000px'}}>
        <h3 className="font-bold text-sm mb-2 teal">Tipo de Propiedad</h3>
        {TIPOS.map(t=>(
          <label key={t} className="checkbox-row"><input type="checkbox" checked={tipos.includes(t)} onChange={()=>toggle(setTipos,tipos,t)}/>{t}</label>
        ))}

        <h3 className="font-bold text-sm mt-4 mb-2 teal">Área m² Cubierta</h3>
        <div className="flex gap-2">
          <input type="number" value={areaMin} onChange={e=>setAreaMin(Number(e.target.value))} className="w-full border rounded px-2 py-1 text-sm"/>
          <input type="number" value={areaMax} onChange={e=>setAreaMax(Number(e.target.value))} className="w-full border rounded px-2 py-1 text-sm"/>
        </div>

        <h3 className="font-bold text-sm mt-4 mb-2 teal">Valor (USD)</h3>
        <div className="flex gap-2">
          <input type="number" value={valorMin} onChange={e=>setValorMin(Number(e.target.value))} className="w-full border rounded px-2 py-1 text-sm"/>
          <input type="number" value={valorMax} onChange={e=>setValorMax(Number(e.target.value))} className="w-full border rounded px-2 py-1 text-sm"/>
        </div>

        <h3 className="font-bold text-sm mt-4 mb-2 teal">Antigüedad</h3>
        <select value={antiguedad} onChange={e=>setAntiguedad(e.target.value)} className="w-full border rounded px-2 py-2 text-sm bg-teal text-white">
          <option>Todas</option>
          {ANTIGUEDADES.map(a=><option key={a}>{a}</option>)}
        </select>

        <h3 className="font-bold text-sm mt-4 mb-2 teal">Cocheras</h3>
        <div className="flex flex-wrap gap-1">
          {['Todas','0','1','2','3+'].map(c=>(
            <span key={c} className={`chip ${cocheras===c?'active':''}`} onClick={()=>setCocheras(c)}>{c}</span>
          ))}
        </div>

        <h3 className="font-bold text-sm mt-4 mb-2 teal">Disposición</h3>
        <div className="flex flex-wrap gap-1">
          {DISPOSICIONES.map(d=>(
            <span key={d} className={`chip ${disposiciones.includes(d)?'active':''}`} onClick={()=>toggle(setDisposiciones,disposiciones,d)}>{d}</span>
          ))}
        </div>

        <h3 className="font-bold text-sm mt-4 mb-2 teal">Inmobiliaria</h3>
        <select value={inmobiliaria} onChange={e=>setInmobiliaria(e.target.value)} className="w-full border rounded px-2 py-2 text-sm bg-teal text-white">
          <option>Todas</option>
          {INMOBILIARIAS.map(i=><option key={i}>{i}</option>)}
        </select>

        <h3 className="font-bold text-sm mt-4 mb-2 teal">Ambientes</h3>
        {['1','2','3','4','5','6+'].map(a=>(
          <label key={a} className="checkbox-row"><input type="checkbox" checked={ambientes.includes(a)} onChange={()=>toggle(setAmbientes,ambientes,a)}/>{a}</label>
        ))}
      </aside>

      <main className="flex-1 flex flex-col">
        <div className="flex items-center justify-between border-b border-gray-200 px-4 py-2">
          <div className="font-bold text-sm teal">Análisis $/m²</div>
          <div className="flex gap-3 py-2">
            <div className="bg-gray-100 rounded-lg px-4 py-2 text-center">
              <div className="text-xl font-bold teal">{fmt(avgM2)}</div>
              <div className="text-[11px] text-gray-500">Valor m² prom.</div>
            </div>
            <div className="bg-gray-100 rounded-lg px-4 py-2 text-center">
              <div className="text-xl font-bold teal">{filtered.length}</div>
              <div className="text-[11px] text-gray-500">Propiedades</div>
            </div>
          </div>
        </div>

        <div className="grid grid-cols-3 gap-4 p-4" style={{minHeight:'480px'}}>
          <div className="col-span-2">
            <div ref={plotRef} style={{width:'100%', height:'460px'}}/>
          </div>
          <div className="border rounded-lg overflow-hidden flex flex-col" style={{maxHeight:'460px'}}>
            <div className="bg-teal text-white px-3 py-2">
              <div className="font-bold text-sm">🔥 Top propiedades según filtros</div>
              <div className="text-[11px] opacity-80">Ordenado por popularidad relativa al tiempo publicado</div>
            </div>
            <div className="table-container overflow-y-auto">
              <table className="w-full text-xs">
                <thead className="bg-gray-50 sticky top-0">
                  <tr>
                    <th className="text-left p-2 cursor-pointer select-none" onClick={()=>onSortVistas('barrio')}>Propiedad<Arrow active={sortVistas.key==='barrio'} dir={sortVistas.dir}/></th>
                    <th className="text-right p-2 cursor-pointer select-none" onClick={()=>onSortVistas('price_value')}>Precio<Arrow active={sortVistas.key==='price_value'} dir={sortVistas.dir}/></th>
                    <th className="text-right p-2 cursor-pointer select-none" onClick={()=>onSortVistas('views')}>Views<Arrow active={sortVistas.key==='views'} dir={sortVistas.dir}/></th>
                  </tr>
                </thead>
                <tbody>
                  {topVistas.slice(0,30).map(d=>(
                    <tr key={d.posting_id} className="border-t hover:bg-gray-50">
                      <td className="p-2">
                        <a href={d.url} target="_blank" className="text-blue-600 font-medium block">{d.real_estate_type} en {d.barrio}</a>
                        <span className="text-gray-400">{d.covered_area_m2} m² · {d.rooms} amb</span>
                      </td>
                      <td className="p-2 text-right">US$ {fmt(d.price_value)}</td>
                      <td className="p-2 text-right">
                        <span className="inline-block bg-teal text-white rounded px-1.5 py-0.5 text-[11px]">{d.views}</span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <div className="grid grid-cols-2 gap-4 p-4 border-t border-gray-200">
          <div>
            <h4 className="font-bold text-sm mb-2 teal">Por Inmobiliaria</h4>
            <div className="table-container overflow-y-auto border rounded-lg" style={{maxHeight:'260px'}}>
              <table className="w-full text-xs">
                <thead className="bg-gray-50 sticky top-0"><tr className="text-gray-500">
                  <th className="text-left p-2 cursor-pointer select-none" onClick={()=>onSortInmob('name')}>Inmobiliaria<Arrow active={sortInmob.key==='name'} dir={sortInmob.dir}/></th>
                  <th className="text-right p-2 cursor-pointer select-none" onClick={()=>onSortInmob('avgM2')}>Valor m²<Arrow active={sortInmob.key==='avgM2'} dir={sortInmob.dir}/></th>
                  <th className="text-right p-2 cursor-pointer select-none" onClick={()=>onSortInmob('qty')}>Cant.<Arrow active={sortInmob.key==='qty'} dir={sortInmob.dir}/></th>
                </tr></thead>
                <tbody>{porInmobiliaria.map(r=>(
                  <tr key={r.name} className="border-t hover:bg-gray-50"><td className="p-2">{r.name}</td><td className="p-2 text-right">{fmt(r.avgM2)}</td><td className="p-2 text-right">{r.qty}</td></tr>
                ))}</tbody>
              </table>
            </div>
          </div>
          <div>
            <h4 className="font-bold text-sm mb-2 teal">Por Barrio</h4>
            <div className="table-container overflow-y-auto border rounded-lg" style={{maxHeight:'260px'}}>
              <table className="w-full text-xs">
                <thead className="bg-gray-50 sticky top-0"><tr className="text-gray-500">
                  <th className="text-left p-2 cursor-pointer select-none" onClick={()=>onSortBarrio('name')}>Barrio<Arrow active={sortBarrio.key==='name'} dir={sortBarrio.dir}/></th>
                  <th className="text-right p-2 cursor-pointer select-none" onClick={()=>onSortBarrio('avgM2')}>Valor m²<Arrow active={sortBarrio.key==='avgM2'} dir={sortBarrio.dir}/></th>
                  <th className="text-right p-2 cursor-pointer select-none" onClick={()=>onSortBarrio('qty')}>Cant.<Arrow active={sortBarrio.key==='qty'} dir={sortBarrio.dir}/></th>
                </tr></thead>
                <tbody>{porBarrio.map(r=>(
                  <tr key={r.name} className="border-t hover:bg-gray-50"><td className="p-2">{r.name}</td><td className="p-2 text-right">{fmt(r.avgM2)}</td><td className="p-2 text-right">{r.qty}</td></tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
