<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Inmobiliario MDP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Custom scrollbar para las tablas */
        .table-container::-webkit-scrollbar {
            width: 6px;
        }
        .table-container::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #888; 
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }
    </style>
</head>
<body class="bg-white text-gray-800 font-sans h-screen overflow-hidden">
    <div id="root" class="h-full"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { createClient } = supabase;

        // --- Configuración de Supabase ---
        // IMPORTANTE: Reemplaza 'TU_ANON_KEY' con tu clave anónima real de Supabase.
        // Puedes encontrarla en tu panel de Supabase: Project Settings -> API -> anon public
        const supabaseUrl = 'https://pntruonwgiotzdslnjgc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBudHJ1b253Z2lvdHpkc2xuamdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwODQ5MTksImV4cCI6MjA4NzY2MDkxOX0.ObqlbfjIeCt3Z15oqDS3l3tRSohzw-hmi5fUX5giVBg'; 
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        // Colores para la leyenda y los puntos (coinciden con la imagen)
        const COLORS = {
            1: '#3b82f6', // blue-500
            2: '#1d4ed8', // blue-800
            3: '#f97316', // orange-500
            4: '#7e22ce', // purple-700
            5: '#ec4899', // pink-500
            6: '#8b5cf6', // violet-500
            7: '#eab308', // yellow-500
            8: '#ef4444', // red-500
        };

        const formatNumber = (num) => new Intl.NumberFormat('en-US').format(num);

        const App = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            // Estados de los filtros
            const [tipos, setTipos] = useState([]);
            const [areaMin, setAreaMin] = useState(20);
            const [areaMax, setAreaMax] = useState(240);
            const [valorMin, setValorMin] = useState(50000);
            const [valorMax, setValorMax] = useState(150000);
            const [inmobiliaria, setInmobiliaria] = useState('Todas');
            const [ambientes, setAmbientes] = useState([]);
            const [barrio, setBarrio] = useState('Todas');

            // Opciones únicas extraídas de los datos
            const [opciones, setOpciones] = useState({
                tipos: [],
                inmobiliarias: [],
                barrios: [],
                ambientes: []
            });

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        // Intentar obtener datos reales de Supabase
                        const { data: supaData, error } = await supabaseClient
                            .from('propiedades_mdp')
                            .select('*');
                        
                        let finalData = supaData;

                        // Si hay error (ej. falta la key) o no hay datos, usamos mock data para que el dashboard funcione
                        if (error || !supaData || supaData.length === 0) {
                            console.warn("No se pudo obtener datos de Supabase o la tabla está vacía. Usando datos de prueba. Asegúrate de poner tu TU_ANON_KEY.");
                            finalData = generateMockData();
                        }

                        setData(finalData);

                        // Extraer opciones únicas para los filtros
                        const uniqueTipos = [...new Set(finalData.map(d => d.type_subtitle).filter(Boolean))].sort();
                        const uniqueInmobiliarias = [...new Set(finalData.map(d => d.publisher).filter(Boolean))].sort();
                        const uniqueBarrios = [...new Set(finalData.map(d => d.Barrio).filter(Boolean))].sort();
                        const uniqueAmbientes = [...new Set(finalData.map(d => d.rooms).filter(Boolean))].sort((a,b)=>a-b);

                        setOpciones({
                            tipos: uniqueTipos,
                            inmobiliarias: uniqueInmobiliarias,
                            barrios: uniqueBarrios,
                            ambientes: uniqueAmbientes
                        });

                    } catch (err) {
                        console.error("Error:", err);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            // Filtrado dinámico
            const filteredData = useMemo(() => {
                return data.filter(item => {
                    if (tipos.length > 0 && !tipos.includes(item.type_subtitle)) return false;
                    if (ambientes.length > 0 && !ambientes.includes(item.rooms)) return false;
                    if (inmobiliaria !== 'Todas' && item.publisher !== inmobiliaria) return false;
                    if (barrio !== 'Todas' && item.Barrio !== barrio) return false;
                    if (item.total_area_m2 < areaMin || item.total_area_m2 > areaMax) return false;
                    if (item.price_value < valorMin || item.price_value > valorMax) return false;
                    return true;
                });
            }, [data, tipos, ambientes, inmobiliaria, barrio, areaMin, areaMax, valorMin, valorMax]);

            // KPIs
            const avgValorM2 = useMemo(() => {
                if (filteredData.length === 0) return 0;
                const sum = filteredData.reduce((acc, item) => acc + (item.price_value / item.total_area_m2), 0);
                return Math.round(sum / filteredData.length);
            }, [filteredData]);

            // Agrupación para las tablas inferiores
            const aggregateBy = (key) => {
                const groups = {};
                filteredData.forEach(item => {
                    const val = item[key] || 'No Identificado';
                    if (!groups[val]) groups[val] = { count: 0, sumM2: 0 };
                    groups[val].count += 1;
                    groups[val].sumM2 += (item.price_value / item.total_area_m2);
                });
                return Object.keys(groups).map(k => ({
                    name: k,
                    quantity: groups[k].count,
                    avgM2: Math.round(groups[k].sumM2 / groups[k].count)
                })).sort((a, b) => b.quantity - a.quantity);
            };

            const realEstateData = aggregateBy('publisher');
            const locationData = aggregateBy('Barrio');
            const ambientesData = aggregateBy('rooms');

            const toggleArrayFilter = (setter, array, value) => {
                setter(array.includes(value) ? array.filter(v => v !== value) : [...array, value]);
            };

            if (loading) return <div className="flex items-center justify-center h-full text-2xl text-teal-800 font-bold">Cargando Dashboard...</div>;

            return (
                <div className="flex h-full w-full bg-white">
                    {/* Panel Lateral Izquierdo */}
                    <div className="w-64 bg-gray-50 p-5 flex flex-col gap-6 overflow-y-auto border-r border-gray-200 shrink-0">
                        <div className="text-left">
                            <h1 className="text-4xl font-bold text-teal-800 underline decoration-4 underline-offset-4 mb-1">Price</h1>
                            <h1 className="text-4xl font-bold text-teal-800 underline decoration-4 underline-offset-4">Analysis</h1>
                        </div>

                        {/* Filtro: Tipo */}
                        <div>
                            <h3 className="font-bold text-teal-800 text-lg mb-2">Tipo</h3>
                            <div className="flex flex-col gap-1.5 ml-1">
                                {opciones.tipos.map(t => (
                                    <label key={t} className="flex items-center gap-2 text-sm cursor-pointer text-gray-700">
                                        <input type="checkbox" className="w-4 h-4 accent-teal-700"
                                            checked={tipos.includes(t)}
                                            onChange={() => toggleArrayFilter(setTipos, tipos, t)}
                                        />
                                        {t}
                                    </label>
                                ))}
                            </div>
                        </div>

                        {/* Filtro: Area M2 */}
                        <div>
                            <h3 className="font-bold text-teal-800 text-lg mb-2">Area M2</h3>
                            <div className="flex flex-col gap-2 w-24 ml-1">
                                <input type="number" value={areaMin} onChange={e => setAreaMin(Number(e.target.value))} className="border border-gray-300 p-1 text-sm bg-white" />
                                <input type="number" value={areaMax} onChange={e => setAreaMax(Number(e.target.value))} className="border border-gray-300 p-1 text-sm bg-white" />
                            </div>
                        </div>

                        {/* Filtro: Valor */}
                        <div>
                            <h3 className="font-bold text-teal-800 text-lg mb-2">Valor</h3>
                            <div className="flex flex-col gap-2 w-24 ml-1">
                                <input type="number" value={valorMin} onChange={e => setValorMin(Number(e.target.value))} className="border border-gray-300 p-1 text-sm bg-white" />
                                <input type="number" value={valorMax} onChange={e => setValorMax(Number(e.target.value))} className="border border-gray-300 p-1 text-sm bg-white" />
                            </div>
                        </div>

                        {/* Filtro: Inmobiliaria */}
                        <div>
                            <h3 className="font-bold text-teal-800 text-lg mb-2">Inmobiliaria</h3>
                            <select value={inmobiliaria} onChange={e => setInmobiliaria(e.target.value)} className="w-full border-none p-2 text-sm bg-teal-800 text-white outline-none cursor-pointer">
                                <option value="Todas">Todas</option>
                                {opciones.inmobiliarias.map(i => <option key={i} value={i}>{i}</option>)}
                            </select>
                        </div>

                        {/* Filtro: Ambientes */}
                        <div>
                            <h3 className="font-bold text-teal-800 text-lg mb-2">Ambientes</h3>
                            <div className="flex flex-col gap-1.5 ml-1">
                                {opciones.ambientes.map(a => (
                                    <label key={a} className="flex items-center gap-2 text-sm cursor-pointer text-gray-700">
                                        <input type="checkbox" className="w-4 h-4 accent-teal-700"
                                            checked={ambientes.includes(a)}
                                            onChange={() => toggleArrayFilter(setAmbientes, ambientes, a)}
                                        />
                                        {a}
                                    </label>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Contenido Principal */}
                    <div className="flex-1 flex flex-col p-6 overflow-hidden">
                        {/* Header Superior */}
                        <div className="flex justify-between items-start mb-2">
                            <div className="flex-1 text-center">
                                <h2 className="text-3xl font-bold text-teal-800 mb-4">Análisis de valor de mercado según superficie y número de ambientes</h2>
                                <div className="flex items-center justify-center gap-4 text-sm font-medium text-gray-600">
                                    <span>Rooms</span>
                                    {Object.keys(COLORS).map(r => (
                                        <div key={r} className="flex items-center gap-1">
                                            <div className="w-3 h-3 rounded-full" style={{ backgroundColor: COLORS[r] }}></div>
                                            <span>{r}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="w-48 pt-2">
                                <h3 className="font-bold text-teal-800 mb-1">Barrio</h3>
                                <select value={barrio} onChange={e => setBarrio(e.target.value)} className="w-full border-none p-2 text-sm bg-teal-800 text-white outline-none cursor-pointer">
                                    <option value="Todas">Todas</option>
                                    {opciones.barrios.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                            </div>
                        </div>

                        {/* Gráfico y KPIs */}
                        <div className="flex-1 flex relative min-h-0 mb-6">
                            <div className="flex-1 h-full">
                                <ScatterPlot data={filteredData} />
                            </div>
                            <div className="w-48 flex flex-col gap-6 pl-6 justify-start pt-12">
                                <div className="bg-gray-200 p-6 text-center">
                                    <div className="text-4xl font-light text-gray-800 mb-1">{formatNumber(avgValorM2)}</div>
                                    <div className="text-sm text-gray-500 font-medium">Valor M2</div>
                                </div>
                                <div className="bg-gray-200 p-6 text-center">
                                    <div className="text-4xl font-light text-gray-800 mb-1">{formatNumber(filteredData.length)}</div>
                                    <div className="text-sm text-gray-500 font-medium">Propiedades</div>
                                </div>
                            </div>
                        </div>

                        {/* Tablas Inferiores */}
                        <div className="h-64 grid grid-cols-4 gap-6">
                            <Table title="Real Estate" data={realEstateData} />
                            <Table title="Location" data={locationData} />
                            <Table title="Ambientes" data={ambientesData} />
                            <div className="flex flex-col h-full">
                                <div className="flex justify-center font-bold text-teal-800 border-b-[3px] border-gray-300 pb-2 mb-2 text-base">
                                    <span>Link</span>
                                </div>
                                <div className="flex-1 overflow-y-auto table-container text-xs pr-2">
                                    {filteredData.slice(0, 100).map((item, idx) => (
                                        <div key={idx} className="truncate p-1.5 border-b border-gray-200 hover:bg-gray-50">
                                            <a href={item.url} target="_blank" rel="noreferrer" className="text-gray-600 hover:text-teal-700 transition-colors">
                                                {item.url || 'Sin enlace'}
                                            </a>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Componente de Tabla Reutilizable
        const Table = ({ title, data }) => (
            <div className="flex flex-col h-full">
                <div className="flex justify-between font-bold text-teal-800 border-b-[3px] border-gray-300 pb-2 mb-2 text-base">
                    <span>{title}</span>
                    <div className="flex gap-6">
                        <span>Valor M2</span>
                        <span>Quantity</span>
                    </div>
                </div>
                <div className="flex-1 overflow-y-auto table-container text-sm pr-1">
                    {data.map((row, idx) => (
                        <div key={idx} className={`flex justify-between p-2 ${idx % 2 === 0 ? 'bg-white' : 'bg-gray-100'}`}>
                            <span className="truncate w-1/2 text-gray-700" title={row.name}>{row.name}</span>
                            <div className="flex gap-6 w-1/2 justify-end text-gray-700">
                                <span className="w-16 text-right">{formatNumber(row.avgM2)}</span>
                                <span className="w-16 text-right">{formatNumber(row.quantity)}</span>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // Componente del Gráfico Plotly
        const ScatterPlot = ({ data }) => {
            const plotRef = useRef(null);

            useEffect(() => {
                if (!plotRef.current) return;

                const traces = [];
                // Agrupar datos por cantidad de ambientes para asignar colores
                const grouped = data.reduce((acc, item) => {
                    const r = item.rooms || 'N/A';
                    if (!acc[r]) acc[r] = { x: [], y: [], text: [], marker: { color: COLORS[r] || '#9ca3af', size: 7, opacity: 0.8 } };
                    
                    acc[r].x.push(item.total_area_m2);
                    const valM2 = item.total_area_m2 > 0 ? item.price_value / item.total_area_m2 : 0;
                    acc[r].y.push(valM2);
                    
                    // Texto al pasar el mouse
                    acc[r].text.push(`Barrio: ${item.Barrio || 'N/A'}<br>URL: ${item.url || 'N/A'}`);
                    
                    return acc;
                }, {});

                for (const [rooms, traceData] of Object.entries(grouped)) {
                    traces.push({
                        x: traceData.x,
                        y: traceData.y,
                        text: traceData.text,
                        mode: 'markers',
                        type: 'scatter',
                        name: rooms,
                        marker: traceData.marker,
                        hoverinfo: 'text'
                    });
                }

                const layout = {
                    margin: { t: 20, l: 60, r: 20, b: 40 },
                    xaxis: { 
                        title: 'Area M2', 
                        showgrid: true, 
                        gridcolor: '#f3f4f6', 
                        zeroline: false,
                        tickfont: { color: '#6b7280' },
                        titlefont: { color: '#374151' }
                    },
                    yaxis: { 
                        title: 'Valor por M2', 
                        showgrid: true, 
                        gridcolor: '#f3f4f6', 
                        zeroline: false,
                        tickfont: { color: '#6b7280' },
                        titlefont: { color: '#374151' }
                    },
                    showlegend: false,
                    plot_bgcolor: 'white',
                    paper_bgcolor: 'white',
                    hovermode: 'closest'
                };

                const config = { responsive: true, displayModeBar: false };

                Plotly.newPlot(plotRef.current, traces, layout, config);

                return () => {
                    Plotly.purge(plotRef.current);
                };
            }, [data]);

            return <div ref={plotRef} className="w-full h-full" />;
        };

        // Función para generar datos de prueba si falla la conexión a Supabase
        function generateMockData() {
            const types = ['Casas', 'Departamentos', 'Locales', 'Oficinas', 'Ph'];
            const barrios = ['Playa Varese', 'Torreón', 'Lomas De Stella Maris', 'Stella Maris', 'Cabo Corrientes', 'Playa Chica', 'Playa Grande', 'Güemes'];
            const publishers = ['No Identificado', 'yacoub', 're max feliz', 'girard propiedades', 'century 21', 'homes land'];
            const mock = [];
            for (let i = 0; i < 2000; i++) {
                const area = Math.floor(Math.random() * 220) + 20;
                const rooms = Math.floor(Math.random() * 6) + 1;
                // Simular curva de valor por m2 que decrece con el área
                const baseM2 = 3500 - (area * 6) + (Math.random() * 800);
                const price = Math.floor(baseM2 * area);
                mock.push({
                    id: i,
                    total_area_m2: area,
                    price_value: price,
                    rooms: rooms,
                    Barrio: barrios[Math.floor(Math.random() * barrios.length)],
                    type_subtitle: types[Math.floor(Math.random() * types.length)],
                    publisher: publishers[Math.floor(Math.random() * publishers.length)],
                    url: `https://www.zonaprop.com.ar/propiedades/mock-${i}.html`
                });
            }
            return mock;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
